<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6c5ce7;
      --accent: #a29bfe;
      --background: #f4f7fe;
      --text-dark: #2d3436;
      --text-light: #636e72;
      --error: #d63031;
      --success: #00b894;
      --warning: #fab005;
      --visited: #ffeaa7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      color: var(--text-dark);
    }

    .main-container {
      width: 100%;
      max-width: 1200px;
      height: 92vh;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 1.5rem 2rem;
      background: transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
    }

    .header-left h2 {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
    }

    .header-right .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    #timer {
      font-weight: 600;
      font-size: 16px;
      color: var(--error);
    }

    .quiz-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .navigation {
      width: 90px;
      background-color: rgba(243, 243, 255, 0.85);
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      border-right: 1px solid #dcdde1;
      backdrop-filter: blur(10px);
    }

    .nav-btn {
      width: 42px;
      height: 42px;
      margin: 10px 0;
      border: 2px solid #ccc;
      border-radius: 50%;
      font-weight: 600;
      font-size: 15px;
      color: #333;
      cursor: pointer;
      background: white;
      transition: all 0.25s ease-in-out;
      box-shadow: 0 3px 5px rgba(0, 0, 0, 0.08);
    }

    .nav-btn:hover {
      transform: scale(1.08);
      background-color: var(--accent);
      color: white;
      border-color: var(--primary);
    }

    .nav-btn.active {
      background-color: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .nav-btn.answered {
      background-color: var(--success);
      color: white;
      border-color: #00a67c;
    }

    .nav-btn.unanswered {
      background-color: var(--error);
      color: white;
      border-color: #c0392b;
    }

    .nav-btn.visited:not(.answered):not(.unanswered) {
      background-color: var(--warning);
      color: #333;
      border-color: #f08c00;
    }

    .question-panel {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .question {
      width: 100%;
      max-width: 750px;
    }

    .question-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 2.5rem;
      border-radius: 20px;
      border: 1px solid #e6e6e6;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }

    .question-box p {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text-dark);
    }

    .question-box label {
      display: block;
      margin: 14px 0;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      transition: color 0.2s;
    }

    .question-box label:hover {
      color: var(--primary);
    }

    button {
      padding: 12px 28px;
      margin-top: 25px;
      margin-right: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
    }

    button:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, var(--accent), var(--primary));
    }

    #subject-selection {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      border-radius: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    #subject-selection h2 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1.5rem;
    }

    #subject-dropdown {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      margin: 1rem 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      background-color: #ffffff;
      width: 100%;
      max-width: 300px;
      transition: border-color 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    #subject-dropdown:focus {
      border-color: var(--primary);
      outline: none;
    }
  </style>
</head>

<body>

  <!-- Subject Selection Overlay -->
  <div id="subject-selection">
    <h2>Select CS Field</h2>
    <select id="subject-dropdown">
      <option value="" disabled selected>Select a field</option>
      <option value="webdev">Web Development</option>
      <option value="dsa">Data Structures</option>
      <option value="os">Operating Systems</option>
      <option value="networking">Networking</option>
      <option value="dbms">DBMS</option>
    </select>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- Main Quiz Container -->
  <div class="main-container">
    <div class="header">
      <div class="header-left">
        <h2>Quiz</h2>
      </div>
      <div class="header-right">
        <h3 class="title"></h3>
        <div id="timer"></div>
      </div>
    </div>

    <!-- Quiz Layout -->
    <div class="quiz-container">
      <!-- Navigation Buttons -->
      <div class="navigation" id="nav-buttons-container">
      </div>

      <!-- Question Panel -->
      <div class="question-panel">
        <div class="question" id="question-box">
        </div>
      </div>
    </div>
  </div>

  <script src="./js/test.js" defer></script>
</body>

</html>
